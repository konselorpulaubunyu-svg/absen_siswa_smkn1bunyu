<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Absensi SMKN 1 BUNYU</title>
    <script>
      // Sembunyikan pesan eror websocket dan console noise lainnya
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;
        
        console.error = function(...args) {
          const msg = (args[0] && typeof args[0] === 'string') ? args[0].toLowerCase() : '';
          if (msg.includes('websocket') || msg.includes('vite') || msg.includes('hmr') || msg.includes('socket')) return;
          originalError.apply(console, args);
        };

        console.warn = function(...args) {
          const msg = (args[0] && typeof args[0] === 'string') ? args[0].toLowerCase() : '';
          if (msg.includes('websocket') || msg.includes('vite')) return;
          originalWarn.apply(console, args);
        };

        // Tangani rejection yang tidak tertangkap terkait websocket
        window.addEventListener('unhandledrejection', function(event) {
          const msg = (event.reason && event.reason.message) ? event.reason.message.toLowerCase() : '';
          if (msg.includes('websocket') || msg.includes('socket')) {
            event.preventDefault();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
